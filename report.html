<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>보고단계</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
      background: #f3f6f9;
      color: #1f2d3d;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 18px 40px;
    }
    .header {
      background: linear-gradient(135deg, #0f6fb5, #008cd2);
      color: white;
      border-radius: 22px;
      padding: 22px 20px;
      box-shadow: 0 10px 24px rgba(0, 78, 140, 0.18);
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 25px;
    }
    .header p {
      margin: 10px 0 0;
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.95;
    }
    .card {
      background: white;
      border-radius: 22px;
      margin-top: 18px;
      padding: 24px 20px;
      box-shadow: 0 8px 24px rgba(31, 45, 61, 0.08);
    }
    .section-title {
      margin: 0 0 14px;
      font-size: 22px;
      color: #0f6fb5;
      text-align: center;
    }
    .phone-box {
      padding: 18px;
      border-radius: 16px;
      background: #f8fbfd;
      border: 1px solid #d8ebf7;
      text-align: center;
    }
    .phone-label {
      font-size: 16px;
      color: #567086;
      margin-bottom: 6px;
    }
    .phone-num {
      font-size: 28px;
      font-weight: 700;
      color: #0f6fb5;
      margin-bottom: 8px;
    }
    .phone-desc {
      font-size: 14px;
      color: #5b6777;
      line-height: 1.6;
    }
    .call-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 16px;
      width: 100%;
      min-height: 58px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #0f6fb5, #008cd2);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
    }
    .report-box {
      margin-top: 18px;
      padding: 18px;
      border-radius: 16px;
      background: #fffdf7;
      border: 1px solid #f0e4b7;
    }
    .report-box h3 {
      margin: 0 0 12px;
      font-size: 19px;
      color: #8b6a00;
    }
    .report-box ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.9;
      font-size: 15px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 18px;
      width: 100%;
      min-height: 54px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      color: white;
      background: #6b7785;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>[3] 보고단계</h1>
      <p>현장 상황을 확인한 후 아래 연락처로 즉시 보고해 주세요.</p>
    </div>

    <div class="card">
      <h2 class="section-title">안전환경팀 연락</h2>

      <div class="phone-box">
        <div class="phone-label">안전환경팀 윤정일 팀장</div>
        <div class="phone-num">052-231-5572</div>
        <div class="phone-desc">
          현장 사진 촬영 후 즉시 유선 보고 바랍니다.
        </div>
        <a class="call-btn" href="tel:0522315572">전화 걸기</a>
      </div>

      <div class="report-box">
        <h3>보고사항</h3>
        <ul>
          <li>보고자</li>
          <li>누출 위치</li>
          <li>누출 시간</li>
          <li>누출범위(피해 범위)</li>
          <li>현장 인원 / 공정 상 피해 여부 (피해 있을 시 피해인원 이름)</li>
          <li>누출 차단 완료 여부</li>
        </ul>
      </div>

      <a class="back-btn" href="./index.html">처음으로</a>
    </div>
  </div>
</body>
</html>
